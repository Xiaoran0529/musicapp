<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Player</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:           #dde4ef;
  --shadow-dark:  #a3afbf;
  --shadow-light: #ffffff;
  --pressed-bg:   #d4dbe8;
  --icon-color:   #a8bace;
  --icon-hover:   #7a94ae;
  --icon-pressed: #8fa8c0;
  --acc:  #6b8cba; --acc2: #8fa5cc;
  --tp:   #1e2d42; --ts:   #7a8fa8;
  --l1:   #c8d4e8; --l2:   #9ab0cc;
  --tr:   0.45s ease;
}

body {
  min-height:100vh; display:flex;
  justify-content:center; align-items:center;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden; transition:background var(--tr);
}
.iphone {
  transform-origin:top center;
}

.iphone {
  width:375px; height:720px;
  background:var(--bg); border-radius:50px;
  box-shadow:none;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; align-items:center;
  transition:background var(--tr),box-shadow var(--tr);
}
.iphone::before { display:none; }

.genre-tag {
  position:absolute; top:40px; left:50%; transform:translateX(-50%);
  font-size:10px; font-weight:700; letter-spacing:2px;
  color:var(--acc); opacity:0.7; white-space:nowrap;
  transition:color var(--tr),opacity 0.3s;
}
.genre-tag.hidden { opacity:0; }

.content {
  width:100%; height:100%;
  padding:56px 28px 28px;
  display:flex; flex-direction:column; align-items:center;
}

.top-nav {
  width:100%; display:flex; justify-content:flex-start; align-items:center;
  margin-top:12px; margin-bottom:12px;
}

/* ── 核心按钮：无描边，纯阴影塑形，大圆角 ── */
.neu-btn {
  border:none; cursor:pointer; outline:none;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg);
  -webkit-tap-highlight-color:transparent;
  transition:
    box-shadow 0.22s cubic-bezier(.4,0,.2,1),
    background 0.22s cubic-bezier(.4,0,.2,1),
    transform   0.15s cubic-bezier(.4,0,.2,1),
    background-color var(--tr);
}
/* raised */
.neu-btn {
  box-shadow:
    7px 7px 14px var(--shadow-dark),
    -7px -7px 14px var(--shadow-light);
}
.neu-btn:hover {
  box-shadow:
    5px 5px 10px var(--shadow-dark),
    -5px -5px 10px var(--shadow-light);
}
/* pressed / active */
.neu-btn.pressed,
.neu-btn:active {
  background:var(--pressed-bg);
  box-shadow:
    inset 5px 5px 10px var(--shadow-dark),
    inset -4px -4px 8px var(--shadow-light),
    inset 2px 2px 4px rgba(0,0,0,0.06);
  transform:scale(0.97);
}
.neu-btn.click-feedback { transform:scale(0.94); }

/* icon — stroke only, no fill, colour from variable */
.neu-btn svg {
  stroke:var(--icon-color); fill:none;
  stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round;
  pointer-events:none;
  transition:stroke 0.25s ease;
}
.neu-btn:hover svg   { stroke:var(--icon-hover); }
.neu-btn.pressed svg { stroke:var(--icon-pressed); }
.neu-btn.liked svg   { stroke:var(--acc); fill:var(--acc); }

/* back button */
.back-btn { width:44px; height:44px; border-radius:14px; }
.back-btn svg { width:18px; height:18px; }

/* action buttons — larger, bigger radius like image 1 */
.ctrl-btn { width:62px; height:62px; border-radius:22px; }
.ctrl-btn svg { width:22px; height:22px; }

/* turntable */
.turntable-wrapper {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; width:100%; flex:1;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.4s ease;
  transform-origin:center top;
}

.turntable-base {
  width:248px; height:248px; border-radius:28px; background:var(--bg);
  box-shadow:10px 10px 22px var(--shadow-dark),-10px -10px 22px var(--shadow-light);
  position:relative; display:flex; align-items:center; justify-content:center;
  transition:background var(--tr),box-shadow var(--tr);
}

.vinyl-svg-wrap {
  width:200px; height:200px; border-radius:50%;
  background:#1a1a1a; overflow:hidden; position:relative; z-index:1;
  box-shadow:inset 2px 2px 8px #0a0a0a,0 4px 16px rgba(0,0,0,0.3);
  cursor:pointer; user-select:none;
  transition:transform 0.1s;
}
.vinyl-svg-wrap:active { transform:scale(0.97); }
.vinyl-svg-wrap.spinning { animation:spin 3s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.vinyl-svg { display:block; width:200px; height:200px; }

.tonearm-pivot {
  position:absolute; top:-14px; right:-14px;
  width:30px; height:30px; border-radius:50%;
  background:linear-gradient(145deg,#d4d4d4,#b0b0b0);
  box-shadow:3px 3px 6px var(--shadow-dark),-3px -3px 6px var(--shadow-light);
  z-index:10;
}
.tonearm {
  position:absolute; top:4px; right:-2px;
  width:108px; height:4px;
  background:linear-gradient(to bottom,#c8c8c8,#a0a0a0);
  border-radius:2px; transform-origin:right center;
  transform:rotate(-8deg); z-index:5;
  box-shadow:1px 3px 5px rgba(0,0,0,0.2);
  transition:transform 0.75s cubic-bezier(0.34,1.56,0.64,1);
}
.tonearm.playing { transform:rotate(-40deg); }
.tonearm-head {
  position:absolute; left:-2px; top:-3px;
  width:16px; height:10px;
  background:linear-gradient(to bottom,#b8b8b8,#909090);
  border-radius:3px 0 0 3px;
}

.hold-ring {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:210px; height:210px; border-radius:50%;
  pointer-events:none; z-index:2;
}
.hold-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
.hold-ring circle {
  fill:none; stroke:var(--acc); stroke-width:3;
  stroke-dasharray:0 659; stroke-linecap:round;
}

.song-info { margin-top:20px; text-align:center; transition:opacity 0.3s ease; }
.song-info.fading { opacity:0; }
.song-title  { font-size:18px; font-weight:700; color:var(--tp); transition:color var(--tr); }
.song-artist { font-size:12px; color:var(--ts); margin-top:4px; font-weight:500; transition:color var(--tr); }

.hold-hint {
  font-size:10px; color:var(--ts); text-align:center;
  margin-top:10px; letter-spacing:0.5px;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s ease;
}
.turntable-wrapper:hover .hold-hint { opacity:0; }

.controls { width:100%; padding-bottom:4px; }

.progress-container { width:100%; padding:8px 0; margin-bottom:4px; position:relative; }
.progress-track {
  width:100%; height:5px; border-radius:3px; background:var(--bg);
  box-shadow:inset 2px 2px 5px var(--shadow-dark),inset -2px -2px 5px var(--shadow-light);
  position:relative; overflow:visible; cursor:pointer;
  transition:box-shadow var(--tr);
}
.progress-fill {
  height:100%; width:33%; border-radius:3px;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
  transition:background var(--tr);
}
.progress-dot {
  position:absolute; top:50%; left:33%;
  width:10px; height:10px; border-radius:50%;
  background:var(--acc);
  box-shadow:2px 2px 5px var(--shadow-dark),-2px -2px 5px var(--shadow-light);
  transform:translate(-50%,-50%); cursor:grab; z-index:2;
  margin-top:0;
  transition:background var(--tr),box-shadow var(--tr);
}
.time-labels { display:flex; justify-content:space-between; margin-top:8px; }
.time-label  { font-size:11px; color:var(--ts); font-weight:500; }

.btn-row {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:14px; padding:0 32px;
}
#btnLike,#btnDownload,#btnShare { box-shadow:none; background:transparent; }
#btnLike:hover,#btnDownload:hover,#btnShare:hover { box-shadow:none; background:transparent; }
#btnLike.pressed,#btnLike:active,
#btnDownload.pressed,#btnDownload:active,
#btnShare.pressed,#btnShare:active { box-shadow:none; background:transparent; transform:scale(0.94); }
.turntable-wrapper.vinyl-hovered .hold-hint { opacity:0.55; }
/* crate */
.crate-overlay {
  position:absolute; bottom:0; left:0; right:0;
  height:0; background:var(--bg);
  border-radius:28px 28px 0 0;
  box-shadow:0 -6px 20px rgba(0,0,0,0.08);
  overflow:hidden;
  transition:height 0.5s cubic-bezier(0.4,0,0.2,1),background var(--tr);
  z-index:20;
}
.crate-overlay.open { height:56%; }
.crate-handle { width:36px; height:4px; border-radius:2px; background:var(--shadow-dark); margin:12px auto 8px; opacity:0.3; }
.crate-label  { text-align:center; font-size:10px; font-weight:700; letter-spacing:2px; color:var(--ts); margin-bottom:12px; text-transform:uppercase; }
.crate-scroll { display:flex; gap:14px; padding:0 24px 16px; overflow-x:auto; scroll-snap-type:x mandatory; scrollbar-width:none; }
.crate-scroll::-webkit-scrollbar { display:none; }
.crate-item   { flex-shrink:0; scroll-snap-align:center; display:flex; flex-direction:column; align-items:center; cursor:pointer; transition:transform 0.2s; }
.crate-item:active { transform:scale(0.93); }
.crate-disc   { width:90px; height:90px; border-radius:50%; background:#1a1a1a; box-shadow:4px 4px 10px rgba(0,0,0,0.35); transition:box-shadow 0.3s; }
.crate-disc.active-disc { box-shadow:0 0 0 3px var(--acc),4px 4px 10px rgba(0,0,0,0.35); }
.crate-disc svg { width:90px; height:90px; }
.crate-title  { display:none; }
.crate-artist { display:none; }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
<div class="iphone">
  <div class="genre-tag" id="genreTag">AMBIENT</div>
  <div class="content">

    <nav class="top-nav">
      <button class="neu-btn back-btn">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
    </nav>

    <div class="turntable-wrapper" id="turntableWrapper">
      <div class="turntable-base">
        <div class="tonearm-pivot"></div>
        <div class="tonearm" id="tonearm"><div class="tonearm-head"></div></div>
        <div class="hold-ring" id="holdRing">
          <svg viewBox="0 0 210 210">
            <circle id="holdCircle" cx="105" cy="105" r="104"/>
          </svg>
        </div>
        <div class="vinyl-svg-wrap" id="vinylWrap">
          <svg class="vinyl-svg" viewBox="0 0 200 200" width="200" height="200">
            <defs>
              <radialGradient id="labelGrad" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#c8d4e8" id="ls1"/>
                <stop offset="100%" stop-color="#9ab0cc" id="ls2"/>
              </radialGradient>
            </defs>
            <rect width="200" height="200" fill="#1a1a1a"/>
            <circle cx="100" cy="100" r="90" fill="#1a1a1a"/>
            <circle cx="100" cy="100" r="85" fill="none" stroke="#242424" stroke-width="0.8"/>
            <circle cx="100" cy="100" r="76" fill="none" stroke="#1e1e1e" stroke-width="0.8"/>
            <circle cx="100" cy="100" r="67" fill="none" stroke="#242424" stroke-width="0.8"/>
            <circle cx="100" cy="100" r="58" fill="none" stroke="#1e1e1e" stroke-width="0.8"/>
            <circle cx="100" cy="100" r="49" fill="none" stroke="#242424" stroke-width="0.8"/>
            <circle cx="100" cy="100" r="40" fill="none" stroke="#1e1e1e" stroke-width="0.8"/>
            <circle cx="100" cy="100" r="32" fill="url(#labelGrad)" id="vinylLabel"/>
            <circle cx="100" cy="100" r="5" fill="#333"/>
          </svg>
        </div>
      </div>

      <div class="song-info" id="songInfo">
        <div class="song-title" id="songTitle">Midnight Drift</div>
        <div class="song-artist" id="songArtist">Aether & Void</div>
      </div>
      <div class="hold-hint">长按唱片开启唱片柜</div>
    </div>

    <div class="controls" id="controls">
      <div class="progress-container">
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-dot" id="progressDot"></div>
        </div>
        <div class="time-labels">
          <span class="time-label" id="timeCurr">1:24</span>
          <span class="time-label" id="timeTotal">4:12</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="neu-btn ctrl-btn" id="btnLike">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
        <button class="neu-btn ctrl-btn" id="btnDownload">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="neu-btn ctrl-btn" id="btnShare">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="crate-overlay" id="crateOverlay">
    <div class="crate-handle"></div>
    <div class="crate-label">唱片柜</div>
    <div class="crate-scroll" id="crateScroll"></div>
  </div>
</div>

<script>
(function(){
const tracks=[
  {title:'Midnight Drift', artist:'Aether & Void',      genre:'AMBIENT',    dur:252,
   theme:{bg:'#dde4ef',sd:'#a3afbf',sl:'#ffffff',pb:'#d4dbe8',ic:'#a8bace',ih:'#5a7a9a',ip:'#7a94ae',acc:'#6b8cba',acc2:'#8fa5cc',tp:'#1e2d42',ts:'#7a8fa8',l1:'#c8d4e8',l2:'#9ab0cc'}},
  {title:'Neon Pulse',     artist:'Circuit Breaker',   genre:'ELECTRONIC', dur:198,
   theme:{bg:'#1a1a2e',sd:'#0d0d1a',sl:'#2a2a46',pb:'#161628',ic:'#9060c0',ih:'#e94560',ip:'#c050a0',acc:'#e94560',acc2:'#f5756a',tp:'#e8e0ff',ts:'#8878aa',l1:'#3a1a40',l2:'#220d2e'}},
  {title:'Golden Hour',    artist:'The Velvet Strings',genre:'CLASSICAL',  dur:312,
   theme:{bg:'#f2ebe0',sd:'#c8b99a',sl:'#ffffff',pb:'#e8dfd2',ic:'#c0a070',ih:'#a07040',ip:'#b08050',acc:'#c4913a',acc2:'#d4a84a',tp:'#2a1f0e',ts:'#9a7d58',l1:'#e8d4b0',l2:'#c8a878'}},
  {title:'Vapor Chrome',   artist:'Synthetic Bloom',   genre:'SYNTHWAVE',  dur:224,
   theme:{bg:'#0d0d18',sd:'#050509',sl:'#1a1a2e',pb:'#0a0a14',ic:'#8050c0',ih:'#a855f7',ip:'#9045d0',acc:'#a855f7',acc2:'#06b6d4',tp:'#f0e6ff',ts:'#7a6a9a',l1:'#2a1050',l2:'#0d0828'}},
  {title:'Oak & Ember',    artist:'River Soul Band',   genre:'FOLK',       dur:278,
   theme:{bg:'#e8e0d4',sd:'#bab0a0',sl:'#faf8f2',pb:'#dfd7ca',ic:'#b09070',ih:'#7a5c3a',ip:'#8a7050',acc:'#7a5c3a',acc2:'#9a7a52',tp:'#1e1408',ts:'#8a7060',l1:'#d4c4a8',l2:'#b09070'}},
];

const R=document.documentElement;
let cur=0,playing=false,progress=33,ticker=null;
let holdAnim=null,crateOpen=false,liked=false;
const HOLD_MS=600,circ=2*Math.PI*104;

const $=id=>document.getElementById(id);
const genreTag=$('genreTag'),turntableW=$('turntableWrapper');
const tonearm=$('tonearm'),vinylWrap=$('vinylWrap');
const holdCircle=$('holdCircle'),songInfo=$('songInfo');
const songTitle=$('songTitle'),songArtist=$('songArtist');
const controls=$('controls'),crateOver=$('crateOverlay'),crateScroll=$('crateScroll');
const pFill=$('progressFill'),pDot=$('progressDot');
const timeCurr=$('timeCurr'),timeTotal=$('timeTotal');
const btnLike=$('btnLike');

function fmt(s){const m=Math.floor(s/60),s2=Math.floor(s%60);return m+':'+(s2<10?'0':'')+s2;}

function applyTheme(t){
  const h=t.theme;
  R.style.setProperty('--bg',h.bg);
  R.style.setProperty('--shadow-dark',h.sd);
  R.style.setProperty('--shadow-light',h.sl);
  R.style.setProperty('--pressed-bg',h.pb);
  R.style.setProperty('--icon-color',h.ic);
  R.style.setProperty('--icon-hover',h.ih);
  R.style.setProperty('--icon-pressed',h.ip);
  R.style.setProperty('--acc',h.acc);
  R.style.setProperty('--acc2',h.acc2);
  R.style.setProperty('--tp',h.tp);
  R.style.setProperty('--ts',h.ts);
  $('ls1').setAttribute('stop-color',h.l1);
  $('ls2').setAttribute('stop-color',h.l2);
}

function updateProgress(){
  pFill.style.width=progress+'%';
  pDot.style.left=progress+'%';
  pDot.style.top='50%';
  pDot.style.transform='translate(-50%,-50%)';
  timeCurr.textContent=fmt((progress/100)*tracks[cur].dur);
}

function setPlaying(state){
  playing=state;
  if(state){
    tonearm.classList.add('playing');
    setTimeout(()=>vinylWrap.classList.add('spinning'),600);
    ticker=setInterval(()=>{
      progress+=0.15;
      if(progress>=100){progress=0;setPlaying(false);}
      updateProgress();
    },200);
  } else {
    tonearm.classList.remove('playing');
    vinylWrap.classList.remove('spinning');
    clearInterval(ticker);
  }
}

function switchTrack(idx,fromCrate){
  cur=idx; applyTheme(tracks[idx]);
  songInfo.classList.add('fading');
  genreTag.classList.add('hidden');
  setTimeout(()=>{
    songTitle.textContent=tracks[idx].title;
    songArtist.textContent=tracks[idx].artist;
    genreTag.textContent=tracks[idx].genre;
    timeTotal.textContent=fmt(tracks[idx].dur);
    songInfo.classList.remove('fading');
    genreTag.classList.remove('hidden');
  },300);
  progress=0; updateProgress();
  document.querySelectorAll('.crate-disc').forEach((d,i)=>d.classList.toggle('active-disc',i===idx));
  if(fromCrate){closeCrate();setPlaying(true);}
}

function buildCrate(){
  crateScroll.innerHTML='';
  tracks.forEach((t,i)=>{
    const item=document.createElement('div');
    item.className='crate-item';
    const disc=document.createElement('div');
    disc.className='crate-disc'+(i===cur?' active-disc':'');
    disc.innerHTML=`<svg viewBox="0 0 90 90"><circle cx="45" cy="45" r="44" fill="#1a1a1a"/><circle cx="45" cy="45" r="38" fill="none" stroke="#262626" stroke-width="0.7"/><circle cx="45" cy="45" r="30" fill="none" stroke="#222" stroke-width="0.7"/><circle cx="45" cy="45" r="22" fill="${t.theme.l1}"/><circle cx="45" cy="45" r="3" fill="#333"/></svg>`;
    const info=document.createElement('div');
    info.innerHTML=`<div class="crate-title">${t.title}</div><div class="crate-artist">${t.artist}</div>`;
    item.appendChild(disc); item.appendChild(info);
    item.addEventListener('click',()=>switchTrack(i,true));
    crateScroll.appendChild(item);
  });
}

function openCrate(){
  crateOpen=true; buildCrate();
  crateOver.classList.add('open');
  turntableW.style.transform='scale(0.72) translateY(-18px)';
  turntableW.style.opacity='0.85';
  turntableW.classList.add('crate-open');
  turntableW.classList.remove('vinyl-hovered');
  controls.style.opacity='0.35';
  controls.style.pointerEvents='none';
  genreTag.classList.add('hidden');
  songInfo.style.opacity='0';
  songInfo.style.pointerEvents='none';
  setTimeout(()=>{
    const items=crateScroll.querySelectorAll('.crate-item');
    if(items[cur])items[cur].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },300);
}

function closeCrate(){
  crateOpen=false;
  crateOver.classList.remove('open');
  turntableW.style.transform='';
  turntableW.style.opacity='';
  turntableW.classList.remove('crate-open');
  controls.style.opacity='';
  controls.style.pointerEvents='';
  genreTag.classList.remove('hidden');
  songInfo.style.opacity='';
  songInfo.style.pointerEvents='';
}

function startHold(e){
  if(crateOpen) return;
  e.preventDefault();
  let elapsed=0;
  holdAnim=setInterval(()=>{
    elapsed+=16;
    const pct=Math.min(elapsed/HOLD_MS,1);
    holdCircle.style.strokeDasharray=`${pct*circ} ${circ}`;
    if(elapsed>=HOLD_MS){
      clearInterval(holdAnim);holdAnim=null;
      holdCircle.style.strokeDasharray=`0 ${circ}`;
      if(playing)setPlaying(false);
      openCrate();
    }
  },16);
}
function cancelHold(){
  if(holdAnim){clearInterval(holdAnim);holdAnim=null;}
  holdCircle.style.strokeDasharray=`0 ${circ}`;
}

vinylWrap.addEventListener('mousedown',startHold);
vinylWrap.addEventListener('touchstart',startHold,{passive:false});

vinylWrap.addEventListener('mousemove',(e)=>{
  if(crateOpen){ turntableW.classList.remove('vinyl-hovered'); return; }
  const r=vinylWrap.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const dist=Math.sqrt((e.clientX-cx)**2+(e.clientY-cy)**2);
  turntableW.classList.toggle('vinyl-hovered', dist<=r.width/2);
});
vinylWrap.addEventListener('mouseleave',()=>{
  turntableW.classList.remove('vinyl-hovered');
});
document.addEventListener('mouseup',cancelHold);
document.addEventListener('touchend',cancelHold);
vinylWrap.addEventListener('click',()=>{if(!crateOpen)setPlaying(!playing);});

crateOver.addEventListener('click',e=>{
  if(e.target===crateOver||e.target.classList.contains('crate-handle'))closeCrate();
});

btnLike.addEventListener('click',function(){
  liked=!liked;
  this.classList.toggle('liked',liked);
  this.classList.toggle('pressed',liked);
  this.classList.add('click-feedback');
  setTimeout(()=>this.classList.remove('click-feedback'),150);
});

[$('btnDownload'),$('btnShare')].forEach(btn=>{
  btn.addEventListener('click',function(){
    this.classList.add('click-feedback');
    setTimeout(()=>this.classList.remove('click-feedback'),150);
  });
});

let dragging=false;
const pTrack=$('progressTrack');
function setProg(e){
  const r=pTrack.getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  progress=Math.max(0,Math.min(100,(x/r.width)*100));
  updateProgress();
}
pDot.addEventListener('mousedown',e=>{dragging=true;e.preventDefault();});
pDot.addEventListener('touchstart',e=>{dragging=true;e.preventDefault();},{passive:false});
document.addEventListener('mousemove',e=>{if(dragging)setProg(e);});
document.addEventListener('touchmove',e=>{if(dragging)setProg(e);},{passive:false});
document.addEventListener('mouseup',()=>dragging=false);
document.addEventListener('touchend',()=>dragging=false);
pTrack.addEventListener('click',setProg);

applyTheme(tracks[0]);
timeTotal.textContent=fmt(tracks[0].dur);
holdCircle.style.strokeDasharray=`0 ${circ}`;
updateProgress();
})();
</script>
<script>
function scaleIphone(){
  const iphone=document.querySelector('.iphone');
  const scaleX=window.innerWidth/375;
  const scaleY=window.innerHeight/720;
  const scale=Math.min(scaleX,scaleY,1);
  iphone.style.transform=`scale(${scale})`;
}
scaleIphone();
window.addEventListener('resize',scaleIphone);
</script>
</body>
